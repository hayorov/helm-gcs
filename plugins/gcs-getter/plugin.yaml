apiVersion: v1
type: getter/v1
name: gcs-getter
version: "0.7.0"
runtime: subprocess
sourceURL: https://github.com/hayorov/helm-gcs

config:
  protocols:
    - gs

runtimeConfig:
  protocolCommands:
    - protocols:
        - gs
      platformCommand:
        - command: "bin/helm-gcs-getter"
  platformHooks:
    install:
      - command: "sh"
        args: ["-c", "cd $HELM_PLUGIN_DIR && ./scripts/install.sh"]
    update:
      - command: "sh"
        args: ["-c", "cd $HELM_PLUGIN_DIR && ./scripts/install.sh"]
